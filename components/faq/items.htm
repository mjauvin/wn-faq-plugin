{% for item in items %}
  <details itemprop="mainEntity" itemscope itemtype="https://schema.org/Question" class="faq-item">
    <summary itemprop="name" class="faq-item-question">{{ item.question }}</summary>
    <div itemprop="acceptedAnswer" itemscope itemtype="https://schema.org/Answer" class="faq-item-answer">
      <span itemprop="text">{{ item.answer | twig | md | parseSnippets }}</span>
    </div>
  </details>
{% endfor %}
